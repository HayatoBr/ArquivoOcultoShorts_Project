# =========================
# ArquivoOcultoShorts - CONFIG PRODUÇÃO (CORRIGIDO)
# =========================

paths:
  output_dir: "output"
  ffmpeg_exe: "C:/ffmpeg/bin/ffmpeg.exe"
  whisper_exe: "C:/whisper-standalone/faster-whisper-xxl.exe"
  whisper_model_dir: "C:/whisper-standalone/_models"
  piper_exe:  "C:/piper/piper.exe"
  piper_model: "C:/piper/models/pt_BR-faber-medium.onnx"

video:
  seconds: 60
  tts_fit_attempts: 3
  tts_fit_tolerance_sec: 1.5
  wpm: 155

images:
  model_path: "models/dreamshaper_8.safetensors"
  retry_attempts: 3
  retry_base_delay: 2
  max_scenes: 6

image_style:
  base_prompt: "cinematic, dramatic lighting, realistic, film grain, shallow depth of field, close-up framing, high detail"
  negative_prompt: "text, watermark, logo, blurry, lowres, bad anatomy, bad hands, extra fingers, deformed, distorted face, mutated, disfigured, cropped, out of frame, jpeg artifacts"

tts:
  model_path: "C:/piper/models/pt_BR-faber-medium.onnx"

whisper:
  whisper_exe: "C:/whisper-standalone/faster-whisper-xxl.exe"
  model_dir: "C:/whisper-standalone/_models"

# SEÇÃO ADICIONADA PARA EVITAR ERROS NAS LEGENDAS
subs:
  font_name: "Arial"
  font_size: 20
  primary_color: "&H00FFFFFF"  # Branco
  outline_color: "&H00000000"  # Preto
  outline_width: 1.5
  shadow_depth: 2
  margin_v: 40

healthcheck:
  enabled: true
  hard_fail: false
  min_free_disk_gb: 3.0
  min_vram_free_mb: 800
  ffmpeg_path: "C:/ffmpeg/bin/ffmpeg.exe"
  piper_path:  "C:/piper/piper.exe"

youtube_upload:
  enabled: false

llm:
  provider: "ollama"           # Alterado para ollama (gratuito/local)
  openai_model: "gpt-4o-mini"
  openai_temperature: 0.7
  openai_max_tokens: 900

  ollama_url: "http://127.0.0.1:11434"
  ollama_model: "llama3.2:latest"
  ollama_timeout: 120
  ollama_qa_enabled: true

research:
  ddg_enabled: true
  ddg_max_results: 5
  ddg_query: ""
