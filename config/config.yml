# =========================
# ArquivoOcultoShorts - CONFIG PRODUÇÃO
# =========================

paths:
  output_dir: "output"
  ffmpeg_exe: "C:/ffmpeg/bin/ffmpeg.exe"
  piper_exe:  "C:/piper/piper.exe"
  piper_model: "C:/piper/models/pt_BR-faber-medium.onnx"
  whisper_exe: "C:/whisper-standalone/faster-whisper-xxl.exe"
  whisper_model_dir: "C:/whisper-standalone/_models"

video:
  seconds: 60
  tts_fit_attempts: 3
  tts_fit_tolerance_sec: 1.5

images:
  model_path: "models/dreamshaper_8.safetensors"
  retry_attempts: 3
  retry_base_delay: 2
  # quantas cenas/prompt por vídeo (3-6 recomendado)
  max_scenes: 6

image_style:
  # identidade visual fixa do canal (aplicada em toda imagem)
  base_prompt: "cinematic, documentary realism, film grain, high detail, dramatic lighting, shallow depth of field"
  # negativos fixos (anti-dedos/mãos etc.)
  negative_prompt: "text, watermark, logo, blurry, lowres, bad anatomy, bad hands, extra fingers, deformed, distorted face, mutated, disfigured, cropped, out of frame, jpeg artifacts"


visual_translator:
  enabled: true
  provider: "auto"        # auto | openai | ollama
  max_scenes: 4           # recomendado 4 (mais coerente)
  kinds_order: ["environment", "detail", "environment", "climax"]
  era_hint: "archival documentary, cinematic, Brazil/world, 1970s–2000s (adapt to topic)"
  max_topic_hints: 8
  max_visual_words: 35
  max_prompt_words: 48

tts:
  model_path: "C:/piper/models/pt_BR-faber-medium.onnx"

whisper:
  whisper_exe: "C:/whisper-standalone/faster-whisper-xxl.exe"
  model_dir: "C:/whisper-standalone/_models"

healthcheck:
  enabled: true
  hard_fail: false
  min_free_disk_gb: 3.0
  min_vram_free_mb: 800
  ffmpeg_path: "C:/ffmpeg/bin/ffmpeg.exe"
  piper_path:  "C:/piper/piper.exe"

youtube_upload:
  enabled: false

llm:
  provider: "openai"           # openai | ollama
  openai_model: "gpt-4o-mini"
  openai_temperature: 0.7
  openai_max_tokens: 900

  ollama_url: "http://127.0.0.1:11434"
  ollama_model: "llama3.2:latest"
  ollama_timeout: 120

  ollama_qa_enabled: true

  ollama_fallback_models:
    - "llama3.1:latest"

research:
  ddg_enabled: true
  ddg_max_results: 5
  # opcional: deixe vazio para usar query automática pelo nicho
  ddg_query: ""
